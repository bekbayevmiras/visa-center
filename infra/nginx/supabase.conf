# Nginx config for Supabase self-hosted on OCI
# Установите certbot и получите сертификат:
# certbot --nginx -d supabase.yourdomain.kz

# Supabase API (Kong)
server {
    listen 80;
    server_name supabase.yourdomain.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name supabase.yourdomain.kz;

    ssl_certificate     /etc/letsencrypt/live/supabase.yourdomain.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.yourdomain.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Увеличим лимит для загрузки документов (паспорта ~5 MB)
    client_max_body_size 50M;

    # Supabase API через Kong
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}

# Supabase Studio (только с вашего IP или через VPN)
server {
    listen 443 ssl http2;
    server_name studio.yourdomain.kz;

    ssl_certificate     /etc/letsencrypt/live/supabase.yourdomain.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.yourdomain.kz/privkey.pem;

    # Доступ только с вашего IP
    # allow YOUR_IP;
    # deny all;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
